steps:
  # Step 1: Build the Docker Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/ems-webapp"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=$_FIREBASE_API_KEY"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN"
      - "--build-arg"
      - "NEXT_PUBLIC_GOOGLE_ANALYTICS_ID=$_GOOGLE_ANALYTICS_ID"
      - "--build-arg"
      - "NEXT_PUBLIC_SITE_URL=$_SITE_URL"
      - "."
    env:
      - "DOCKER_BUILDKIT=1"

  # Step 2: Push the Image to the Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/ems-webapp"]

images:
  - "gcr.io/$PROJECT_ID/ems-webapp"
