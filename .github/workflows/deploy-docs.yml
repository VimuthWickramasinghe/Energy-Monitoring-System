name: Deploy Docusaurus to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # Only trigger this action if files inside docs change
    paths:
      - "docs/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        # This is the magic line for monorepos!
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: yarn install
      - name: Build website
        run: yarn build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/build" # This is correct relative to root, but we must ensure it's found
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
